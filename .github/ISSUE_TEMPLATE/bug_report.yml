name: 问题反馈 / Bug report
title: '[BUG] '
description: 反馈 KyClash 中可以复现的问题 / Report a reproducible KyClash issue
labels: ['bug']
type: Bug

body:
  - type: markdown
    attributes:
      value: |
        提交前请先检索 [KyClash Issues](https://github.com/kysion/kyclash/issues)，并确认问题来自 KyClash 构建。KyClash 尚未发布正式安装包；请勿把 Clash Verge Rev 或其他上游安装包当作 KyClash 报告。

        Before filing, search [KyClash Issues](https://github.com/kysion/kyclash/issues) and confirm that the problem occurs in a KyClash build. KyClash has no official installer release yet; do not report a Clash Verge Rev or other upstream package as KyClash.

  - type: input
    id: version
    attributes:
      label: KyClash 版本与提交 / Version and commit
      description: 提供 About 中的版本和构建提交；本地构建请给出完整 Git commit。
      placeholder: 2.5.3 / eaf37d8d...
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 操作系统 / Operating system
      options:
        - macOS arm64
        - macOS x64
        - Windows x64
        - Windows arm64
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: 系统版本 / OS version
      placeholder: macOS 26.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述 / Description
      description: 说明预期行为、实际行为及影响。
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤 / Reproduction steps
      description: 提供最小、稳定的复现步骤，并说明是否使用 Mihomo TUN 或 KyClash Network 开发功能。
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: 已脱敏诊断 / Redacted diagnostics
      description: 只粘贴已检查并脱敏的相关片段。不要提交订阅、令牌、私钥、完整配置、控制端点或私网地址。
      render: text

  - type: checkboxes
    id: confirmations
    attributes:
      label: 确认 / Confirmation
      options:
        - label: 我确认报告来自 KyClash 构建，而不是上游安装包。 / This report is from a KyClash build, not an upstream installer.
          required: true
        - label: 我已移除凭据、私钥、订阅和其他敏感信息。 / I removed credentials, private keys, subscriptions, and other sensitive data.
          required: true
