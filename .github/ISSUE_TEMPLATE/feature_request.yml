name: 功能请求 / Feature request
title: '[Feature] '
description: 提出 KyClash 产品或工程功能请求 / Propose a KyClash feature
labels: ['enhancement']
type: Feature

body:
  - type: markdown
    attributes:
      value: |
        提交前请检索 [KyClash Issues](https://github.com/kysion/kyclash/issues)。网络架构当前锁定为单站点、WireGuard、QUIC 主通道、WSS/TCP break-before-make 回退，并且 macOS arm64 优先；改变这些边界的建议需要说明迁移、安全和回滚影响。

        Search [KyClash Issues](https://github.com/kysion/kyclash/issues) first. The current networking scope is single-site WireGuard, QUIC primary transport, break-before-make WSS/TCP fallback, and macOS arm64 first. Requests that change those boundaries must explain migration, security, and rollback effects.

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题 / Problem
      description: 描述用户问题，不要只给出实现名称。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案 / Proposed outcome
      description: 描述期望行为、恢复路径和成功标准。
    validations:
      required: true

  - type: checkboxes
    id: platforms
    attributes:
      label: 目标平台 / Target platforms
      options:
        - label: macOS arm64
        - label: macOS x64
        - label: Windows x64
        - label: Windows arm64
        - label: Linux

  - type: textarea
    id: safety
    attributes:
      label: 安全、兼容与回滚 / Safety, compatibility, and rollback
      description: 如果涉及路由、DNS、TUN、凭据、更新或安装器，请说明权限边界、失败恢复及兼容影响。

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives
      description: 描述已考虑的替代方案及其不足。
