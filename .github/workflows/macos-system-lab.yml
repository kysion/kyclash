name: macOS isolated system lab

on:
  pull_request:
    paths:
      - 'src-tauri/src/bin/kyclash-keychain-lab.rs'
      - 'src-tauri/src/bin/kyclash-route-lab.rs'
      - 'src-tauri/src/networking/credentials.rs'
      - 'src-tauri/src/networking/macos_route.rs'
      - 'src-tauri/src/networking/route.rs'
      - 'scripts/macos-system-lab.sh'
      - '.github/workflows/macos-system-lab.yml'
  push:
    branches: [main]
    paths:
      - 'src-tauri/src/bin/kyclash-keychain-lab.rs'
      - 'src-tauri/src/bin/kyclash-route-lab.rs'
      - 'src-tauri/src/networking/credentials.rs'
      - 'src-tauri/src/networking/macos_route.rs'
      - 'src-tauri/src/networking/route.rs'
      - 'scripts/macos-system-lab.sh'
      - '.github/workflows/macos-system-lab.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: false

jobs:
  route-and-keychain:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.96.1'

      - name: Run fixed-scope route and Keychain lifecycle
        shell: bash
        env:
          KYCLASH_RUNNER_ENVIRONMENT: ${{ runner.environment }}
        run: bash scripts/macos-system-lab.sh

      - name: Upload redacted macOS system evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kyclash-macos-system-lab-${{ runner.arch }}
          path: target/macos-system-lab/
          if-no-files-found: error
          retention-days: 14
