name: Linux Peer credential v2

on:
  pull_request:
    paths:
      - 'network-sidecar/internal/productionpeer/**'
      - 'network-sidecar/cmd/kyclash-network-peer/**'
      - 'network-sidecar/lab/linux/credential-v2-native.sh'
      - '.github/workflows/linux-peer-credential-v2.yml'
  push:
    branches:
      - main
      - 'codex/**'
    paths:
      - 'network-sidecar/internal/productionpeer/**'
      - 'network-sidecar/cmd/kyclash-network-peer/**'
      - 'network-sidecar/lab/linux/credential-v2-native.sh'
      - '.github/workflows/linux-peer-credential-v2.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: network-sidecar
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache-dependency-path: network-sidecar/go.sum

      - name: Record runner provenance
        run: |
          set -euo pipefail
          mkdir -p build/credential-v2-native
          systemd_version="$(systemd --version)"
          systemd_first_line="${systemd_version%%$'\n'*}"
          read -r systemd_name systemd_major _ <<< "${systemd_first_line}"
          {
            uname -a
            cat /etc/os-release
            printf '%s\n' "${systemd_version}"
            go version
          } | tee build/credential-v2-native/provenance.txt
          if [[ "${systemd_name}" != systemd || "${systemd_major}" != 255 ]]; then
            echo "credential_v2_native=unsupported_systemd_version"
            exit 1
          fi

      - name: Install native ACL tools
        run: sudo apt-get update && sudo apt-get install -y acl util-linux

      - name: Verify module and source
        run: |
          set -euo pipefail
          go mod download
          go mod verify
          test -z "$(gofmt -l internal/productionpeer)"
          go vet ./internal/productionpeer ./cmd/kyclash-network-peer

      - name: Test production Peer package
        run: |
          set -euo pipefail
          go test -count=1 ./internal/productionpeer ./cmd/kyclash-network-peer
          go test -race -count=5 ./internal/productionpeer

      - name: Run native credential ACL and read-only mount matrix
        run: |
          set -o pipefail
          mkdir -p build/credential-v2-native
          bash lab/linux/credential-v2-native.sh 2>&1 |
            tee build/credential-v2-native/run.log

      - name: Compile CGO-free architecture matrix
        run: |
          set -euo pipefail
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go test -c -o "${RUNNER_TEMP}/productionpeer-amd64.test" \
            ./internal/productionpeer
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go test -c -o "${RUNNER_TEMP}/productionpeer-arm64.test" \
            ./internal/productionpeer
          file "${RUNNER_TEMP}/productionpeer-amd64.test" |
            grep -F 'x86-64'
          file "${RUNNER_TEMP}/productionpeer-arm64.test" |
            grep -F 'ARM aarch64'

      - name: Upload native evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-peer-credential-v2-${{ runner.arch }}-${{ github.sha }}
          path: network-sidecar/build/credential-v2-native/
          if-no-files-found: error
          retention-days: 14
