name: KyClash macOS arm64 release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: false

jobs:
  release-gate:
    name: Verify release authorization
    if: vars.KYCLASH_MACOS_RELEASE_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify tag, branch, and version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_NAME}" = "v${version}"
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '24.18.0'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm release:ownership-check
      - run: pnpm typecheck
      - run: pnpm web:build
      - run: pnpm lint
      - run: pnpm i18n:check
      - run: pnpm knip:check

  build-package:
    name: Build signed KyClash PKG
    needs: release-gate
    runs-on: macos-15
    environment: kyclash-production-release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.96.1'
          targets: aarch64-apple-darwin

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '24.18.0'
          cache: pnpm

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache-dependency-path: network-sidecar/go.sum

      - run: pnpm install --frozen-lockfile

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build and sign nested network sidecar
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm network-sidecar:macos aarch64-apple-darwin

      - name: Build and sign route helper
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm route-helper:macos

      - name: Build signed arm64 application bundle
        uses: tauri-apps/tauri-action@v1.0.0
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tauriScript: pnpm
          args: --target aarch64-apple-darwin --bundles app --config src-tauri/tauri.networking.macos.conf.json
          includeUpdaterJson: false

      - name: Prepare Apple notary API key
        if: vars.KYCLASH_NOTARIZATION_ENABLED == 'true'
        env:
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
        run: node scripts/prepare-apple-notary-key.mjs

      - name: Package signed PKG with optional notarization
        env:
          APPLE_INSTALLER_SIGNING_IDENTITY: ${{ secrets.APPLE_INSTALLER_SIGNING_IDENTITY }}
          KYCLASH_NOTARIZATION_ENABLED: ${{ vars.KYCLASH_NOTARIZATION_ENABLED }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER }}
        run: pnpm macos:pkg aarch64-apple-darwin

      - name: Verify application and installer identities
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          app='target/aarch64-apple-darwin/release/bundle/macos/KyClash.app'
          packages=(target/aarch64-apple-darwin/release/bundle/pkg/KyClash_*_aarch64.pkg)
          test "${#packages[@]}" -eq 1
          pkg="${packages[0]}"
          sidecar="$app/Contents/Resources/kyclash-network-sidecar"
          helper="$app/Contents/Resources/kyclash-route-helper"
          helper_plist="$app/Contents/Library/LaunchDaemons/net.kysion.kyclash.route-helper.plist"
          trust="$app/Contents/Resources/resources/kyclash-network-sidecar-aarch64-apple-darwin.trust.json"
          codesign --verify --deep --strict --verbose=2 "$app"
          test -f "$sidecar"
          test -f "$helper"
          test -f "$helper_plist"
          test -f "$trust"
          codesign --verify --strict --verbose=2 "$sidecar"
          codesign --verify --strict --verbose=2 "$helper"
          test "$(codesign -d --verbose=4 "$sidecar" 2>&1 | sed -n 's/^TeamIdentifier=//p')" = "$APPLE_TEAM_ID"
          test "$(codesign -d --verbose=4 "$helper" 2>&1 | sed -n 's/^TeamIdentifier=//p')" = "$APPLE_TEAM_ID"
          codesign --verify --strict --verbose=2 -R='identifier "net.kysion.kyclash.network-sidecar" and anchor apple generic and certificate leaf[subject.OU] = "RQUQ8Y3S9H"' "$sidecar"
          codesign --verify --strict --verbose=2 -R='identifier "net.kysion.kyclash.route-helper" and anchor apple generic and certificate leaf[subject.OU] = "RQUQ8Y3S9H"' "$helper"
          test "$(shasum -a 256 "$sidecar" | awk '{print $1}')" = "$(node -p "require(require('path').resolve(process.argv[1])).sha256" "$trust")"
          test ! -e "$app/Contents/Resources/resources/kyclash-route-helper"
          plutil -lint "$helper_plist"
          pkgutil --check-signature "$pkg"
          shasum -a 256 "$pkg" > "$pkg.sha256"

      - name: Verify optional notarization and Gatekeeper acceptance
        if: vars.KYCLASH_NOTARIZATION_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          app='target/aarch64-apple-darwin/release/bundle/macos/KyClash.app'
          packages=(target/aarch64-apple-darwin/release/bundle/pkg/KyClash_*_aarch64.pkg)
          test "${#packages[@]}" -eq 1
          spctl --assess --type execute --verbose=2 "$app"
          spctl --assess --type install --verbose=2 "${packages[0]}"
          xcrun stapler validate "${packages[0]}"

      - name: Attest PKG
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/aarch64-apple-darwin/release/bundle/pkg/KyClash_*.pkg

      - name: Publish authorized KyClash release
        uses: softprops/action-gh-release@v3
        with:
          name: 'KyClash ${{ github.ref_name }}'
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          files: |
            target/aarch64-apple-darwin/release/bundle/pkg/KyClash_*.pkg
            target/aarch64-apple-darwin/release/bundle/pkg/KyClash_*.pkg.sha256

      - name: Remove Apple notary API key
        if: always()
        shell: bash
        run: test -z "${APPLE_NOTARY_KEY_PATH:-}" || rm -f "$APPLE_NOTARY_KEY_PATH"
