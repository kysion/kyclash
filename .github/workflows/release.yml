name: KyClash macOS arm64 release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: false

jobs:
  release-gate:
    name: Verify release authorization
    if: vars.KYCLASH_MACOS_RELEASE_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify tag, branch, and version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_NAME}" = "v${version}"
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '24.18.0'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm release:ownership-check
      - run: pnpm typecheck
      - run: pnpm web:build
      - run: pnpm lint
      - run: pnpm i18n:check
      - run: pnpm knip:check

  build-package:
    name: Build signed, notarized KyClash PKG
    needs: release-gate
    runs-on: macos-15
    environment: kyclash-production-release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.96.1'
          targets: aarch64-apple-darwin

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '24.18.0'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build signed arm64 application bundle
        uses: tauri-apps/tauri-action@v1.0.0
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tauriScript: pnpm
          args: --target aarch64-apple-darwin --bundles app
          includeUpdaterJson: false

      - name: Prepare Apple notary API key
        env:
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
        run: node scripts/prepare-apple-notary-key.mjs

      - name: Package, notarize, staple, and validate PKG
        env:
          APPLE_INSTALLER_SIGNING_IDENTITY: ${{ secrets.APPLE_INSTALLER_SIGNING_IDENTITY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER }}
        run: pnpm macos:pkg aarch64-apple-darwin

      - name: Verify application and installer identities
        shell: bash
        run: |
          set -euo pipefail
          app='target/aarch64-apple-darwin/release/bundle/macos/KyClash.app'
          packages=(target/aarch64-apple-darwin/release/bundle/pkg/KyClash_*_aarch64.pkg)
          test "${#packages[@]}" -eq 1
          pkg="${packages[0]}"
          codesign --verify --deep --strict --verbose=2 "$app"
          spctl --assess --type execute --verbose=2 "$app"
          pkgutil --check-signature "$pkg"
          spctl --assess --type install --verbose=2 "$pkg"
          xcrun stapler validate "$pkg"
          shasum -a 256 "$pkg" > "$pkg.sha256"

      - name: Attest PKG
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/aarch64-apple-darwin/release/bundle/pkg/KyClash_*.pkg

      - name: Publish authorized KyClash release
        uses: softprops/action-gh-release@v3
        with:
          name: 'KyClash ${{ github.ref_name }}'
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          files: |
            target/aarch64-apple-darwin/release/bundle/pkg/KyClash_*.pkg
            target/aarch64-apple-darwin/release/bundle/pkg/KyClash_*.pkg.sha256

      - name: Remove Apple notary API key
        if: always()
        shell: bash
        run: test -z "${APPLE_NOTARY_KEY_PATH:-}" || rm -f "$APPLE_NOTARY_KEY_PATH"
