name: Network sidecar

on:
  pull_request:
    paths:
      - 'network-sidecar/**'
      - '.github/workflows/network-sidecar.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'docs/architecture/kyclash-network-runtime-v1.md'
      - 'docs/roadmap/kyclash-runtime-*-review-20260721.md'
      - 'docs/roadmap/kyclash-sidecar-stdio-*.md'
      - 'schemas/fixtures/network-ipc-*.json'
      - 'schemas/fixtures/network-sidecar-bootstrap-*.json'
      - 'schemas/fixtures/network-sidecar-handshake-*.json'
      - 'schemas/kyclash-network-production-v2.schema.json'
      - 'schemas/fixtures/network-production-v2.valid.json'
      - 'src/types/networking.ts'
      - 'src/types/networking-production-v2.ts'
      - 'scripts/network-production-v2-contract.test.mjs'
      - 'scripts/build-network-sidecar-macos.mjs'
      - 'scripts/prepare-macos-vm-route-fixture.sh'
      - 'scripts/macos-vm-route-helper-v2-matrix.sh'
      - 'scripts/macos-vm-app-managed-tun-matrix.sh'
      - 'macos/route-helper/**'
      - 'macos/app-tun-lab/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src-tauri/Cargo.toml'
      - 'src-tauri/build.rs'
      - 'src-tauri/src/lib.rs'
      - 'src-tauri/src/networking/**'
  push:
    branches: [main]
    paths:
      - 'network-sidecar/**'
      - '.github/workflows/network-sidecar.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'docs/architecture/kyclash-network-runtime-v1.md'
      - 'docs/roadmap/kyclash-runtime-*-review-20260721.md'
      - 'docs/roadmap/kyclash-sidecar-stdio-*.md'
      - 'schemas/fixtures/network-ipc-*.json'
      - 'schemas/fixtures/network-sidecar-bootstrap-*.json'
      - 'schemas/fixtures/network-sidecar-handshake-*.json'
      - 'schemas/kyclash-network-production-v2.schema.json'
      - 'schemas/fixtures/network-production-v2.valid.json'
      - 'src/types/networking.ts'
      - 'src/types/networking-production-v2.ts'
      - 'scripts/network-production-v2-contract.test.mjs'
      - 'scripts/build-network-sidecar-macos.mjs'
      - 'scripts/prepare-macos-vm-route-fixture.sh'
      - 'scripts/macos-vm-route-helper-v2-matrix.sh'
      - 'scripts/macos-vm-app-managed-tun-matrix.sh'
      - 'macos/route-helper/**'
      - 'macos/app-tun-lab/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src-tauri/Cargo.toml'
      - 'src-tauri/build.rs'
      - 'src-tauri/src/lib.rs'
      - 'src-tauri/src/networking/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  signed-macos-bundle:
    if: github.event_name != 'pull_request'
    runs-on: macos-15
    environment: kyclash-production-release
    env:
      HAS_SIGNING_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE != '' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache-dependency-path: network-sidecar/go.sum

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '24.18.0'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Record unavailable signing evidence boundary
        if: env.HAS_SIGNING_CERTIFICATE != 'true'
        run: echo '::notice::APPLE_CERTIFICATE is not configured; signed S1.08 evidence remains pending'

      - uses: apple-actions/import-codesign-certs@v6
        if: env.HAS_SIGNING_CERTIFICATE == 'true'
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build and verify signed nested sidecar
        if: env.HAS_SIGNING_CERTIFICATE == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          pnpm network-sidecar:macos aarch64-apple-darwin
          binary='src-tauri/sidecar/kyclash-network-sidecar-aarch64-apple-darwin'
          manifest='src-tauri/resources/kyclash-network-sidecar-aarch64-apple-darwin.trust.json'
          codesign --verify --strict --verbose=2 "$binary"
          test "$(codesign -d --verbose=4 "$binary" 2>&1 | sed -n 's/^TeamIdentifier=//p')" = "$APPLE_TEAM_ID"
          test "$(shasum -a 256 "$binary" | awk '{print $1}')" = "$(node -p "require(require('path').resolve(process.argv[1])).sha256" "$manifest")"
          file "$binary" | grep -F 'arm64'

      - name: Build and verify signed route helper
        if: env.HAS_SIGNING_CERTIFICATE == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          pnpm route-helper:macos
          binary='src-tauri/helpers/kyclash-route-helper'
          codesign --verify --strict --verbose=2 "$binary"
          test "$(codesign -d --verbose=4 "$binary" 2>&1 | sed -n 's/^TeamIdentifier=//p')" = "$APPLE_TEAM_ID"
          codesign --verify --strict --verbose=2 -R='identifier "net.kysion.kyclash.route-helper" and anchor apple generic and certificate leaf[subject.OU] = "RQUQ8Y3S9H"' "$binary"
          file "$binary" | grep -F 'arm64'

      - uses: actions/upload-artifact@v4
        if: env.HAS_SIGNING_CERTIFICATE == 'true'
        with:
          name: signed-network-sidecar-${{ github.sha }}
          path: |
            src-tauri/sidecar/kyclash-network-sidecar-aarch64-apple-darwin
            src-tauri/resources/kyclash-network-sidecar-aarch64-apple-darwin.trust.json
            network-sidecar/build/aarch64-apple-darwin/
            src-tauri/helpers/kyclash-route-helper
          if-no-files-found: error
          retention-days: 14

  linux-impaired-network:
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: network-sidecar
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache-dependency-path: network-sidecar/go.sum

      - name: Install isolated network-lab tools
        run: sudo apt-get update && sudo apt-get install -y iproute2 nftables

      - name: Run impaired-network matrix
        run: |
          set -o pipefail
          mkdir -p build/linux-netem
          sudo env PATH="$PATH" GOCACHE="${RUNNER_TEMP}/kyclash-go-cache" \
            bash lab/linux/netem-lab.sh run 2>&1 | tee build/linux-netem/run.log

      - name: Upload Linux network evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: network-sidecar-linux-netem-${{ runner.arch }}
          path: network-sidecar/build/linux-netem/
          if-no-files-found: error
          retention-days: 14

  linux-loopback-reliability-soak:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: network-sidecar
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache-dependency-path: network-sidecar/go.sum

      - name: Run loopback-only reliability soak
        run: |
          set -o pipefail
          mkdir -p build/reliability-soak-hosted
          KYCLASH_SOAK_ROUNDS=20 \
          KYCLASH_SOAK_TIMEOUT=120s \
          KYCLASH_SOAK_OUTPUT=build/reliability-soak-hosted \
            bash lab/linux/reliability-soak.sh 2>&1 | tee build/reliability-soak-hosted/run.log

      - name: Upload loopback reliability evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: network-sidecar-loopback-soak-${{ runner.arch }}-${{ github.sha }}
          path: network-sidecar/build/reliability-soak-hosted/
          if-no-files-found: error
          retention-days: 14

  verify:
    runs-on: macos-15
    timeout-minutes: 60
    defaults:
      run:
        working-directory: network-sidecar
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache-dependency-path: network-sidecar/go.sum

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.95.0'
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '24.18.0'
          cache: pnpm

      - name: Install frontend dependencies
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile

      - name: Verify TypeScript IPC ownership
        working-directory: ${{ github.workspace }}
        run: pnpm typecheck

      - name: Verify production profile v2 cross-language contract
        working-directory: ${{ github.workspace }}
        run: pnpm network-production-v2:contract

      - name: Verify Rust protocol-v2 ownership
        working-directory: ${{ github.workspace }}
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
          cargo test -p clash-verge --all-features --lib
          cargo clippy -p clash-verge --all-targets --all-features -- -D warnings

      - name: Verify module and formatting
        run: |
          go mod download
          go mod verify
          test -z "$(gofmt -l .)"

      - name: Test deterministic reliability smoke matrix
        run: |
          set -o pipefail
          mkdir -p build/reliability-smoke
          {
            # Keep a quick, explicit reliability gate on every change. These
            # tests use only loopback peers and in-memory userspace devices;
            # they do not mutate routes, require root, or contact an endpoint.
            go test -count=1 -timeout=90s \
              ./internal/carrier \
              ./internal/labserver \
              ./internal/userspace \
              ./internal/wgcarrier
            go test -count=1 -timeout=90s \
              ./internal/ipc -run '^TestBackendFailureReasonCodeIsStableAndStateRemainsBounded$'
          } 2>&1 | tee build/reliability-smoke/run.log

      - name: Upload reliability smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: network-sidecar-reliability-smoke-${{ runner.arch }}-${{ github.sha }}
          path: network-sidecar/build/reliability-smoke/run.log
          if-no-files-found: error
          retention-days: 14

      - name: Test race safety
        run: |
          set -o pipefail
          mkdir -p build/race
          # Keep every package at five race-detector repetitions. Isolate both
          # CPU-heavy loopback WireGuard matrices so unrelated package workers
          # cannot consume their probe budgets on the three-core hosted runner.
          # Run non-lab packages in two bounded workers: the previous single
          # multi-package invocation reached its 600-second test timeout before
          # it could finish on a cold macOS runner. Each package keeps the same
          # 600-second per-test bound and no package is dropped. The custom tag
          # widens only this instrumented lab's probe budget; ordinary and
          # release builds retain the shipped one-second value.
          go list ./... | grep -Ev '/internal/(labserver|systemlabpeer)$' > build/race/packages.txt
          {
            race_exit_code=0
            mkdir -p build/race/non-lab
            if ! xargs -P 2 -n 1 sh -c '
              package="$1"
              name="${package#./}"
              name=$(printf "%s" "$name" | tr "/." "__")
              {
                printf "%s\n" "package=$package"
                go test -race -count=5 -timeout=600s "$package"
              } > "build/race/non-lab/${name}.log" 2>&1
            ' kyclash < build/race/packages.txt; then
              race_exit_code=1
            fi
            for log in build/race/non-lab/*.log; do
              if test -f "$log"; then
                cat "$log"
              fi
            done
            if ! go test -race -tags=kyclash_race_lab -count=1 -timeout=60s \
                ./internal/userspace \
                -run '^TestRaceLabHealthProbeBudgetIsIsolated$'; then
              race_exit_code=1
            fi
            if ! go test -race -tags=kyclash_race_lab -count=5 -timeout=600s \
                ./internal/systemlabpeer; then
              race_exit_code=1
            fi
            if ! go test -race -tags=kyclash_race_lab -count=5 -timeout=600s \
                ./internal/labserver; then
              race_exit_code=1
            fi
            exit "$race_exit_code"
          } 2>&1 | tee build/race/run.log

      - name: Upload race-test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: network-sidecar-race-${{ runner.arch }}-${{ github.sha }}
          path: network-sidecar/build/race/
          if-no-files-found: error
          retention-days: 14

      - name: Record carrier performance baseline
        if: ${{ !cancelled() }}
        run: |
          set -o pipefail
          mkdir -p build/bench
          {
            uname -a
            go version
            go test ./internal/carrier -run '^$' \
              -bench '^BenchmarkQUICCarrierFragmentedRoundTrip$' \
              -benchtime=10s -count=3 -benchmem
          } 2>&1 | tee build/bench/carrier.txt

      - name: Upload performance baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: network-sidecar-benchmark-${{ runner.arch }}-${{ github.sha }}
          path: network-sidecar/build/bench/carrier.txt
          if-no-files-found: error
          retention-days: 14

      - name: Vet source
        run: go vet ./...

      - name: Validate disposable-VM route scripts
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          /bin/bash -n \
            scripts/prepare-macos-vm-route-fixture.sh \
            scripts/macos-vm-route-helper-v2-matrix.sh \
            scripts/macos-vm-app-managed-tun-matrix.sh
          env -u BASH_ENV -u ENV \
            scripts/macos-vm-route-helper-v2-matrix.sh dry-run | \
            grep -Fx 'dry_run_mutations=none'
          env -u BASH_ENV -u ENV \
            scripts/macos-vm-route-helper-v2-matrix.sh live-dry-run | \
            grep -Fx 'dry_run_mutations=none'
          env -u BASH_ENV -u ENV \
            scripts/macos-vm-route-helper-v2-matrix.sh live-static-check | \
            grep -Fx 'static_mutations=none'
          env -u BASH_ENV -u ENV \
            scripts/macos-vm-app-managed-tun-matrix.sh dry-run | \
            grep -Fx 'dry_run_mutations=none'
          env -u BASH_ENV -u ENV \
            scripts/macos-vm-app-managed-tun-matrix.sh static-check | \
            grep -Fx 'static_mutations=none'

      - name: Compile owned macOS utun adapter
        run: |
          set -euo pipefail
          go test -run '^$' -tags=kyclash_utun ./internal/userspace ./cmd/kyclash-network-sidecar
          go test -run '^$' -tags='kyclash_utun kyclash_utun_lab' ./internal/userspace ./cmd/kyclash-network-sidecar
          go test -run '^$' -tags='kyclash_utun kyclash_utun_lab' \
            -c -o "${RUNNER_TEMP}/kyclash-utun-mihomo-lab.test" ./internal/userspace
          go test -run '^$' -tags='kyclash_utun kyclash_utun_lab' \
            -c -o "${RUNNER_TEMP}/kyclash-utun-lab.test" ./cmd/kyclash-network-sidecar
          file "${RUNNER_TEMP}/kyclash-utun-mihomo-lab.test" | grep -F 'arm64'
          file "${RUNNER_TEMP}/kyclash-utun-lab.test" | grep -F 'arm64'
          "${RUNNER_TEMP}/kyclash-utun-mihomo-lab.test" \
            -test.list '^TestRealUTUNHoldForForcedTermination$' | \
            grep -Fx 'TestRealUTUNHoldForForcedTermination'
          "${RUNNER_TEMP}/kyclash-utun-lab.test" \
            -test.list '^TestRealUTUNProductionSidecarControllerHoldForForcedTermination$' | \
            grep -Fx 'TestRealUTUNProductionSidecarControllerHoldForForcedTermination'

      - name: Compile typed macOS route helper
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          plist='macos/route-helper/net.kysion.kyclash.route-helper.plist'
          plutil -lint "$plist"
          # PlistBuddy reads the typed MachServices boolean without relying on
          # the human-readable `plutil -p` formatting, which differs between
          # macOS runner images. Keep each assertion diagnostic and strict.
          plist_value() {
            local key="$1"
            local expected="$2"
            local actual
            actual="$(/usr/libexec/PlistBuddy -c "Print :${key}" "$plist" 2>/dev/null || true)"
            if [[ "$actual" != "$expected" ]]; then
              echo "::error::route-helper plist ${key}: expected '${expected}', got '${actual}'"
              exit 1
            fi
          }
          plist_absent() {
            local key="$1"
            if /usr/libexec/PlistBuddy -c "Print :${key}" "$plist" >/dev/null 2>&1; then
              echo "::error::route-helper plist must not define ${key}"
              exit 1
            fi
          }
          plist_value 'Label' 'net.kysion.kyclash.route-helper'
          plist_value 'BundleProgram' 'Contents/Resources/kyclash-route-helper'
          plist_value 'MachServices:net.kysion.kyclash.route-helper' 'true'
          plist_absent 'ProgramArguments'
          plist_absent 'EnvironmentVariables'
          test "$(grep -c 'interface.setClasses' macos/route-helper/main.swift)" -eq 18
          xcrun swiftc -parse-as-library -O -target arm64-apple-macos13.0 \
            -framework Foundation -o "${RUNNER_TEMP}/kyclash-route-helper" \
            macos/route-helper/main.swift
          "${RUNNER_TEMP}/kyclash-route-helper" --route-readonly-self-test
          "${RUNNER_TEMP}/kyclash-route-helper" --route-v3-contract-self-test
          "${RUNNER_TEMP}/kyclash-route-helper" --route-coordinator-self-test
          xcrun clang -fobjc-arc -fblocks -Wall -Wextra -Werror \
            -mmacosx-version-min=13.0 -c macos/route-helper/client.m \
            -o "${RUNNER_TEMP}/kyclash-route-helper-client.o"
          xcrun clang -fobjc-arc -fblocks -Wall -Wextra -Werror \
            -mmacosx-version-min=13.0 -c macos/route-helper/lab-client.m \
            -o "${RUNNER_TEMP}/kyclash-route-helper-lab-client.o"
          xcrun clang -fobjc-arc -fblocks -Wall -Wextra -Werror \
            -mmacosx-version-min=13.0 \
            "${RUNNER_TEMP}/kyclash-route-helper-client.o" \
            "${RUNNER_TEMP}/kyclash-route-helper-lab-client.o" \
            -framework Foundation \
            -o "${RUNNER_TEMP}/kyclash-route-helper-lab-client"
          xcrun clang -fobjc-arc -fblocks -Wall -Wextra -Werror \
            -mmacosx-version-min=13.0 \
            -DKYCLASH_ROUTE_HELPER_CLIENT_SELF_TEST \
            macos/route-helper/client.m \
            -framework Foundation \
            -o "${RUNNER_TEMP}/kyclash-route-helper-client-self-test"
          test "$("${RUNNER_TEMP}/kyclash-route-helper-client-self-test")" = \
            'kyclash_route_helper_client_self_test=passed'
          file "${RUNNER_TEMP}/kyclash-route-helper" | grep -F 'arm64'
          file "${RUNNER_TEMP}/kyclash-route-helper-lab-client" | grep -F 'arm64'
          set +e
          interface_probe_output="$(
            "${RUNNER_TEMP}/kyclash-route-helper-lab-client" \
              --if-nametoindex utun65535 2>&1
          )"
          interface_probe_status=$?
          set -e
          test "${interface_probe_status}" -eq 1
          echo "${interface_probe_output}" | \
            grep -Fx 'if_nametoindex device=utun65535 index=0 exists=false'

      - name: Test actual child data plane
        id: actual_child
        if: ${{ !cancelled() }}
        env:
          # The networking-dev lib test compiles the desktop crate on a fresh
          # macOS runner. Bound Cargo's compiler fan-out so a cold cache does
          # not exhaust the runner while the actual-child gate is starting.
          CARGO_BUILD_JOBS: '2'
        run: |
          set -o pipefail
          mkdir -p build/actual-child
          {
            echo '[phase] build actual-child binaries'
            go build -trimpath -o build/actual-child/kyclash-network-sidecar ./cmd/kyclash-network-sidecar
            go build -trimpath -o build/actual-child/kyclash-network-sidecar-lab ./cmd/kyclash-network-sidecar-lab
            echo '[phase] aggregate stdio_runtime tests'
            KYCLASH_NETWORK_SIDECAR_BIN="$PWD/build/actual-child/kyclash-network-sidecar" \
            KYCLASH_NETWORK_LAB_SIDECAR_BIN="$PWD/build/actual-child/kyclash-network-sidecar-lab" \
              cargo test --manifest-path ../src-tauri/Cargo.toml --features networking-dev --lib \
                networking::stdio_runtime::unix::tests:: -- --test-threads=1
            KYCLASH_NETWORK_LAB_SIDECAR_BIN="$PWD/build/actual-child/kyclash-network-sidecar-lab" \
              cargo test --manifest-path ../src-tauri/Cargo.toml --all-features --lib \
                networking::production_controller::stdio_adapter_tests::cancellation_reaches_actual_blocked_child_and_preserves_correlation \
                -- --exact --test-threads=1
            for cycle in 1 2 3; do
              echo "[phase] carrier repeat ${cycle}"
              KYCLASH_NETWORK_LAB_SIDECAR_BIN="$PWD/build/actual-child/kyclash-network-sidecar-lab" \
                cargo test --manifest-path ../src-tauri/Cargo.toml --features networking-dev --lib \
                  networking::stdio_runtime::unix::tests::actual_lab_child_carries_health_traffic_across_all_carriers \
                  -- --exact --test-threads=1
            done
          } 2>&1 | tee build/actual-child/run.log

      - name: Report actual-child failure tail
        if: ${{ !cancelled() && steps.actual_child.outcome == 'failure' }}
        run: |
          set -euo pipefail
          log='build/actual-child/run.log'
          if [[ ! -s "$log" ]]; then
            echo '::error title=actual-child::run.log was not produced'
            exit 0
          fi
          # Keep the final diagnostics visible in the anonymous Checks view
          # without echoing long key/token-shaped values into annotations.
          safe="$(tail -n 12 "$log" \
            | sed -E 's/[[:xdigit:]]{32,}/[redacted-hex]/g; s/[A-Za-z0-9+\/]{40,}={0,2}/[redacted-value]/g; s/%/%25/g; s/\r/ /g' \
            | tr '\n' '|')"
          echo "::error title=actual-child::${safe}"

      - name: Upload actual-child evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: network-sidecar-actual-child-${{ runner.arch }}-${{ github.sha }}
          path: network-sidecar/build/actual-child/run.log
          if-no-files-found: error
          retention-days: 14

      - name: Verify reproducible build
        run: |
          mkdir -p build/first build/second
          go build -trimpath -buildvcs=false -ldflags='-buildid=' -o build/first/kyclash-network-sidecar ./cmd/kyclash-network-sidecar
          go build -trimpath -buildvcs=false -ldflags='-buildid=' -o build/second/kyclash-network-sidecar ./cmd/kyclash-network-sidecar
          shasum -a 256 build/first/kyclash-network-sidecar > build/first.sha256
          shasum -a 256 build/second/kyclash-network-sidecar > build/second.sha256
          cmp build/first/kyclash-network-sidecar build/second/kyclash-network-sidecar
          go version -m build/first/kyclash-network-sidecar > build/dependencies.txt

      - name: Generate licensed CycloneDX SBOM
        run: |
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.10.0
          cyclonedx-gomod mod -json -licenses -test -output build/kyclash-network-sidecar.bom.json .

      - name: Upload verification evidence
        uses: actions/upload-artifact@v4
        with:
          name: network-sidecar-verification-${{ runner.arch }}
          path: |
